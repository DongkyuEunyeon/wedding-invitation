<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="<%= GROOM_FULLNAME %> ❤️ <%= BRIDE_FULLNAME %> 결혼합니다." />
  <meta property="og:image" content="/preview_image.png" />
  <meta property="og:url" content="%BASE_URL%/" />
  <meta property="og:description" content="<%= DESCRIPTION %>" />
  <link rel="preload" href="/MapoGoldenPierA.woff" as="font" crossorigin />
  <link rel="preload" href="/AlluraRegular.woff" as="font" crossorigin />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/font.css" />
  <title>
    <%= GROOM_FULLNAME %> ❤️ <%= BRIDE_FULLNAME %> 결혼합니다.
  </title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  <div style="
	    position: fixed;
	    bottom: 10px; /* 화면 맨 아래에서 살짝 띄워서 답답하지 않게 함 */
	    left: 0;
	    width: 100%;
	    background-color: transparent; /* 배경색 투명 */
	    color: #888; /* 글씨 색상 (원하시면 더 진하게 가능) */
	    text-align: center;
	    padding: 0; /* 박스 여백 없음 */
	    font-size: 0.5rem; /* 글씨 크기 (살짝 작게) */
	    letter-spacing: 1px; /* 글자 간격 */
	    z-index: 9999; /* 다른 요소보다 위에 보이게 */
	    border: none; /* 테두리 없음 */
	    pointer-events: none; /* 클릭 안 되게 (뒤에 내용 클릭 방지) */
	    text-shadow: 0 1px 2px rgba(255,255,255,0.8); /* 흰색 그림자를 살짝 줘서 배경과 겹쳐도 글씨가 잘 보이게 함 */
	">
    동규♥은연 all rights reserved
  </div>

</html>
